<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DORP - Đăng nhập</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(120deg, #ffe29f, #ffa99f);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }

    .login-card .store-name {
      font-size: 32px;
      font-weight: bold;
      color: #f57f17;
      margin-bottom: 10px;
    }

    .login-card h2 {
      margin-bottom: 20px;
      color: #444;
      font-size: 22px;
    }

    .login-card input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      background-color: #f9a825;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-card button:hover {
      background-color: #f57f17;
    }

    .login-card .signup {
      margin-top: 15px;
      font-size: 0.9em;
    }

    .login-card .signup a {
      color: #f57f17;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <!-- Tên cửa hàng DORP -->
    <div class="store-name">DORP</div>

    <!-- Tiêu đề Đăng nhập -->
    <h2>Đăng nhập</h2>

    <!-- Ô nhập Email -->
    <input type="text" id="email" placeholder="Nhập Email" />

    <!-- Ô nhập Password -->
    <input type="password" id="password" placeholder="Nhập Mật khẩu" />

    <!-- Nút đăng nhập -->
    <button onclick="login()">Đăng nhập</button>

    <!-- Phần đăng ký -->
    <div class="signup">
      Chưa có tài khoản? <a href="#">Đăng ký</a>
    </div>
  </div>

  <!-- Xử lý đăng nhập -->
  <script>
    function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (email === "" || password === "") {
        alert("Vui lòng nhập đầy đủ Email và Mật khẩu!");
      } else {
        alert("Đăng nhập thành công!\nTài khoản: " + email);
      }
    }
  </script>

</body>
</html>
